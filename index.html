<!DOCTYPE html>
<html>
<head>
<title>Ultimate Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Roboto&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Roboto;background:#0d0d15;color:white;}
header{background:linear-gradient(90deg,#5a2aa6,#8b3fff);padding:20px;text-align:center;font-family:Cinzel;font-size:32px;}
nav{display:flex;justify-content:center;background:#1b1b29;position:sticky;top:0;z-index:100;}
nav button{background:none;color:white;border:none;padding:15px 20px;cursor:pointer;font-size:16px;}
nav button:hover{background:#3a3a60;border-radius:6px;}
.tab{display:none;padding:20px;}
.card{background:#1a1a2b;padding:20px;margin:15px;border-radius:10px;}
input,textarea,select,button{padding:8px;margin:5px;border-radius:6px;border:none;}
img{max-width:150px;border-radius:10px;margin-top:10px;}
h2{margin-top:0;}
.shop-item{display:flex;justify-content:space-between;align-items:center;margin:10px 0;}
</style>
</head>

<body>

<header>ULTIMATE PORTAL 🐉🚀</header>

<nav>
<button onclick="showTab('dnd')">D&D</button>
<button onclick="showTab('gd')">Geometry Dash</button>
<button onclick="showTab('online')">Online Stuff</button>
<button onclick="showTab('jokes')">Jokes</button>
</nav>

<!-- D&D TAB -->
<div id="dnd" class="tab">
  <div class="card">
    <h2>Account</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <br>
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
    <button onclick="logout()">Logout</button>
    <p id="status"></p>
  </div>

  <div class="card">
    <h2>Dice Roller 🎲</h2>
    <input id="dice" placeholder="e.g. 2d6+1d20">
    <button onclick="rollDice()">Roll</button>
    <p id="diceResult"></p>
  </div>

  <div class="card">
    <h2>Character Sheets Mini-Shop</h2>
    <div class="shop-item">
      <span>Random Character Sheet ($0.10)</span>
      <button onclick="orderItem('Random Character Sheet',0.10)">Order</button>
    </div>

    <div class="shop-item">
      <span>Starter Pack ($0.50)</span>
      <input id="charQty" type="number" value="1" min="1">
      <button onclick="orderItem('Starter Pack',0.50,parseInt(document.getElementById('charQty').value))">Order</button>
    </div>
  </div>
</div>

<!-- GD TAB -->
<div id="gd" class="tab">
  <div class="card">
    <h2>Custom Icons / Tutorial Packs</h2>

    <div class="shop-item">
      <span>Custom Icon Pack ($1.00)</span>
      <input id="gdQty" type="number" value="1" min="1">
      <button onclick="orderItem('Custom Icon Pack',1,parseInt(document.getElementById('gdQty').value))">Order</button>
    </div>

    <div class="shop-item">
      <span>Tutorial Pack ($1.00)</span>
      <input id="gdTutQty" type="number" value="1" min="1">
      <button onclick="orderItem('Tutorial Pack',1,parseInt(document.getElementById('gdTutQty').value))">Order</button>
    </div>
  </div>

  <div class="card">
    <h2>Level Ideas Generator</h2>
    <button onclick="generateLevelIdea()">Generate Idea</button>
    <p id="levelIdea"></p>
  </div>
</div>

<!-- ONLINE TAB -->
<div id="online" class="tab">
  <div class="card">
    <h2>Website Templates Mini-Shop</h2>
    <div class="shop-item">
      <span>Website Template ($1.20)</span>
      <input id="webQty" type="number" value="1" min="1">
      <button onclick="orderItem('Website Template',1.20,parseInt(document.getElementById('webQty').value))">Order</button>
    </div>
  </div>
</div>

<!-- JOKES TAB -->
<div id="jokes" class="tab">
  <div class="card">
    <h2>Memes</h2>
    <div id="memesGallery"></div>
  </div>

  <div class="card">
    <h2>Jokes</h2>
    <textarea id="jokeBox" rows="5"></textarea>
  </div>
</div>

<script>
// ---------------- GLOBAL ----------------
let user = null;

const webhookURL = "https://discord.com/api/webhooks/1465496912974315694/SVKa3SxLA-o4sZbddUsWIS-6udSkopEIgd5t3XS7azC0pd5xPze8Bbhf_Jbp6IkWt-Z2";

const supabase = window.supabase.createClient(
  "https://eyddfsvjmmalmfwpxruq.supabase.co",
  "sb_publishable_fXIjILfuLAz05m8xglPw7w_ATTFG_X0"
);

// ---------------- TABS ----------------
function showTab(tabId) {
  document.querySelectorAll('.tab').forEach(t => t.style.display = 'none');
  document.getElementById(tabId).style.display = 'block';
}

// ---------------- AUTH ----------------
async function signup() {
  const email = emailEl().value;
  const password = passEl().value;
  const { error } = await supabase.auth.signUp({ email, password });
  if (error) alert(error.message);
  else alert("Check your email!");
}

async function login() {
  const email = emailEl().value;
  const password = passEl().value;

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) return alert(error.message);

  user = data.user;
  statusEl().innerText = "Logged in as " + user.email;
}

async function logout() {
  await supabase.auth.signOut();
  user = null;
  statusEl().innerText = "Logged out";
}

// helpers
function emailEl(){return document.getElementById('email')}
function passEl(){return document.getElementById('password')}
function statusEl(){return document.getElementById('status')}

// ---------------- DICE ----------------
function rollDice() {
  let input = document.getElementById('dice').value.split('+');
  let total = 0, rolls = [];

  input.forEach(v => {
    let [n,s] = v.trim().split('d').map(Number);
    if (!n || !s) return;

    for (let i=0;i<n;i++){
      let r = Math.floor(Math.random()*s)+1;
      rolls.push(r);
      total+=r;
    }
  });

  document.getElementById('diceResult').innerText =
    `Rolls: ${rolls.join(', ')} → Total: ${total}`;
}

// ---------------- SHOP ----------------
function orderItem(item, price, qty=1) {
  let name = prompt("Name:");
  let address = prompt("Address:");
  if (!name || !address) return;

  let total = (price*qty).toFixed(2);

  fetch(webhookURL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      content:`New Order
Item: ${item}
Qty: ${qty}
Total: $${total}
Name: ${name}
Address: ${address}`
    })
  });

  alert(`Ordered ${qty} x ${item}`);
}

// ---------------- IDEAS ----------------
function generateLevelIdea(){
  const ideas=[
    "Spinning saws + lava",
    "Underwater maze",
    "Invisible platforms",
    "Gravity flip chaos",
    "Spike timing gauntlet",
    "Music sync level"
  ];
  document.getElementById('levelIdea').innerText =
    ideas[Math.floor(Math.random()*ideas.length)];
}

// ---------------- MEMES ----------------
function loadMemes(){
  let images=[
    "https://via.placeholder.com/150",
    "https://via.placeholder.com/150"
  ];

  let container=document.getElementById("memesGallery");
  container.innerHTML="";

  images.forEach(url=>{
    let div=document.createElement("div");
    div.className="shop-item";
    div.innerHTML=`
      <img src="${url}">
      <button onclick="downloadImage('${url}')">Download</button>
    `;
    container.appendChild(div);
  });
}

function downloadImage(url){
  let a=document.createElement("a");
  a.href=url;
  a.download="meme.png";
  a.click();
}

// ---------------- INIT ----------------
window.onload=()=>{
  showTab('dnd');
  loadMemes();
};
</script>

</body>
</html>
